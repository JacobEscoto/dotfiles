[manager]
ratio = [ 1, 3, 4 ]
sort_by = "name"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
show_hidden = true
show_symlink = true

[preview]
max_width = 1000
max_height = 1000

image_quality = 50

[opener]
edit = [
  { run = 'code "$@"', block = true, desc = "Edit on VS Code" }
]

[open]

rules = [
  { url = "*.{txt,md,json,js,ts,astro,css}", use = "edit" },
  { mime = "text/*", use = "edit" }
]
