[manager]
prepend_keymap = [
  { on = [ "l" ], run = "plugin smart-enter", desc = "Enter a directory or opens a file" },
  { on = [ "h" ], run = "leave", desc = "Return to the parent folder" },
  { on = [ "j" ], run = "arrow 1", desc = "Move cursor down" },
  { on = [ "k" ], run = "arrow -1", desc = "Move cursor up" },

  { on = [ "q" ], run = "quit", desc = "Exit/Close Yazi" },
  { on = [ "g", "g" ], run = "arrow -9999", desc = "Go to the start of the list" },
  { on = [ "G" ], run = "arrow 9999", desc = "Go to the end of the list" },
  { on = [ "a" ], run = "create", desc = "Create file or directory" },
  { on = [ "d" ], run = "remove", desc = "Eliminate element" },
  { on = [ "r"], run = "rename", desc = "Rename element" },
]
